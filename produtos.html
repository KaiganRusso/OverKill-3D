<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MakerFlow • Produtos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <nav class="sidebar">
            <div class="logo">
                <span>🖨️</span>
                <h1>MakerFlow</h1>
            </div>
            <div class="menu">
                <a href="index.html" class="menu-item">🏠 Dashboard</a>
                <a href="calculadora.html" class="menu-item">🧮 Calculadora</a>
                <a href="vendas.html" class="menu-item">💰 Vendas</a>
                <a href="produtos.html" class="menu-item active">📦 Produtos</a>
                <a href="relatorios.html" class="menu-item">📊 Relatórios</a>
            </div>
        </nav>

        <main class="content">
            <h1>📦 Meus Produtos</h1>
            <p class="subtitle">Cadastro e gestão dos seus produtos</p>

            <div class="card">
                <h2>Cadastrar Novo Produto</h2>
                <form id="produtoForm">
                    <div class="input-group">
                        <label for="produtoNome">Nome do Produto</label>
                        <input type="text" id="produtoNome" placeholder="Ex: Suporte para celular" required>
                    </div>
                    <div class="input-group">
                        <label for="produtoCusto">Custo Estimado (R$)</label>
                        <input type="number" id="produtoCusto" step="0.01" required>
                    </div>
                    <div class="input-group">
                        <label for="produtoPreco">Preço de Venda Sugerido (R$)</label>
                        <input type="number" id="produtoPreco" step="0.01" required>
                    </div>
                    <button type="submit" class="btn-calcular">Cadastrar Produto</button>
                </form>
            </div>

            <div class="card" style="margin-top: 1.5rem;">
                <h2>Produtos Cadastrados</h2>
                <div id="listaProdutos">
                    <!-- Preenchido via JS -->
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        const produtoForm = document.getElementById('produtoForm');
        const listaProdutos = document.getElementById('listaProdutos');

        let produtos = JSON.parse(localStorage.getItem('makerflow_produtos')) || [];

        function atualizarListaProdutos() {
            if (produtos.length === 0) {
                listaProdutos.innerHTML = `<p style="color:#64748b; padding:1rem;">Nenhum produto cadastrado ainda.</p>`;
                return;
            }

            let html = '';
            produtos.forEach((p, index) => {
                html += `
                    <div class="produto-item">
                        <div>
                            <strong>${p.nome}</strong><br>
                            <small>Custo: R$ ${p.custo} | Venda: R$ ${p.precoVenda}</small>
                        </div>
                        <small style="color:#4ade80;">Lucro: R$ ${(p.precoVenda - p.custo).toFixed(2)}</small>
                    </div>
                `;
            });
            listaProdutos.innerHTML = html;
        }

        produtoForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const novoProduto = {
                nome: document.getElementById('produtoNome').value,
                custo: parseFloat(document.getElementById('produtoCusto').value),
                precoVenda: parseFloat(document.getElementById('produtoPreco').value)
            };

            produtos.unshift(novoProduto);
            localStorage.setItem('makerflow_produtos', JSON.stringify(produtos));

            alert('Produto cadastrado com sucesso!');
            produtoForm.reset();
            atualizarListaProdutos();
        });

        // Carregar ao abrir
        atualizarListaProdutos();
    </script>
</body>
</html>
